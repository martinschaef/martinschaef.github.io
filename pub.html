<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin Sch&auml;f - Publications</title>
    <link rel="stylesheet" href="stylesheets/modern-style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="publications">

    <div id="page-wrap">

        <nav style="text-align: center; margin-bottom: 20px;">
            <a href="index.html" style="margin-right: 20px; font-weight: 600;">Home</a>
            <a href="pub.html" style="font-weight: 600;">Publications</a>
        </nav>

        <div id="contact-info" class="vcard"></div>


        <dl>

            <dd class="clear"></dd>

            <dt>Publications</dt>
            <dd id="publications-list"></dd>

        <div class="clear"></div>

    </div>

</body>

<script>
    fetch('contact-info.html')
        .then(r => r.text())
        .then(html => document.getElementById('contact-info').innerHTML = html);

    fetch('publications.json')
        .then(r => r.json())
        .then(pubs => {
            const byYear = {};
            pubs.forEach(p => (byYear[p.year] = byYear[p.year] || []).push(p));
            document.getElementById('publications-list').innerHTML = Object.keys(byYear)
                .sort((a, b) => b - a)
                .map(y => `<h2><span>${y >= 2010 ? y : '2010 and earlier'}</span></h2><ul>${byYear[y].map(p =>
                    `<li><b>${p.url ? `<a href="${p.url}" target="_blank">${p.title}</a>` : p.title}</b><br />${p.authors}<br />${p.venue}</li>`
                ).join('')}</ul>`).join('');
        })
        .catch(e => console.error('Failed to load publications:', e));
</script>

</html>
