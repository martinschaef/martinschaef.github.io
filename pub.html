<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin Schäf · Publications</title>
    <link rel="stylesheet" href="stylesheets/modern-style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="pub.html" class="active">Publications</a>
    <a href="https://dblp.org/pid/41/7506.html" target="_blank">DBLP</a>
    <a href="http://scholar.google.com/citations?user=WNktVKIAAAAJ&hl=en" target="_blank">Scholar</a>
</nav>

<main>
    <section>
        <h2>Publications</h2>
        <div id="publications-list"></div>
    </section>
</main>

<script>
    fetch('publications.json')
        .then(r => r.json())
        .then(pubs => {
            const byYear = {};
            pubs.forEach(p => (byYear[p.year] = byYear[p.year] || []).push(p));
            document.getElementById('publications-list').innerHTML = Object.keys(byYear)
                .sort((a, b) => b - a)
                .map(y => `
                    <h3 class="year-heading">${y >= 2010 ? y : '2010 and earlier'}</h3>
                    <ul class="pub-list">${byYear[y].map(p =>
                        `<li>
                            ${p.url ? `<a href="${p.url}" target="_blank" class="pub-title">${p.title}</a>` : `<span class="pub-title">${p.title}</span>`}
                            <span class="pub-authors">${p.authors}</span>
                            <span class="pub-venue">${p.venue}</span>
                        </li>`
                    ).join('')}</ul>
                `).join('');
        })
        .catch(e => console.error('Failed to load publications:', e));
</script>
</body>
</html>
