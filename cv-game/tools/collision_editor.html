<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Level Editor — Career Quest</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; background:#1a1a2e; color:#eee; font-family:monospace; display:flex; height:100vh; }
  #sidebar { width:220px; padding:10px; background:#16213e; display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
  #sidebar h3 { margin:8px 0 4px; color:#f4e842; font-size:13px; }
  #sidebar button { padding:6px; cursor:pointer; font-family:monospace; font-size:12px; border:1px solid #444; background:#0f3460; color:#eee; }
  #sidebar button:hover { background:#1a5276; }
  #sidebar button.active { background:#e94560; border-color:#e94560; }
  .tool-btn { text-align:left; }
  #sidebar label { font-size:11px; color:#aaa; }
  #sidebar select { width:100%; padding:4px; font-family:monospace; background:#0f3460; color:#eee; border:1px solid #444; }
  #main { flex:1; overflow:auto; position:relative; }
  canvas { display:block; image-rendering:pixelated; cursor:crosshair; transform-origin:0 0; }
  #status { position:fixed; bottom:0; left:220px; right:0; background:#16213e; padding:4px 10px; font-size:11px; color:#aaa; border-top:1px solid #333; }
  .char-list { font-size:11px; }
  .char-list div { padding:2px 4px; display:flex; justify-content:space-between; align-items:center; }
  .char-list div:hover { background:#0f3460; }
  .char-list .del { cursor:pointer; color:#e94560; }
</style>
</head><body>
<div id="sidebar">
  <h3>📁 Map</h3>
  <label>Map: <select id="mapSelect">
    <option value="world1">world1</option>
    <option value="world2">world2</option>
    <option value="world3">world3</option>
    <option value="world4">world4</option>
    <option value="world5">world5</option>
  </select></label>
  <button id="btnSave">💾 Save JSON</button>
  <button id="btnLoad">📂 Load JSON</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">

  <h3>🖌 Tools</h3>
  <button class="tool-btn active" data-tool="block">🟧 Block Tile</button>
  <button class="tool-btn" data-tool="erase">⬜ Erase Block</button>
  <button class="tool-btn" data-tool="rectfill">🔲 Rect Fill (drag)</button>
  <button class="tool-btn" data-tool="recterase">🔳 Rect Erase (drag)</button>
  <button class="tool-btn" data-tool="player">🧑 Place Player Spawn</button>
  <button class="tool-btn" data-tool="npc">👤 Place NPC</button>
  <button class="tool-btn" data-tool="door">🚪 Place Door/Exit</button>
  <button class="tool-btn" data-tool="enemy">🐛 Place Enemy</button>
  <button class="tool-btn" data-tool="item">⭐ Place Item</button>

  <label>Brush Size:</label>
  <select id="brushSize">
    <option value="1">1×1</option>
    <option value="3">3×3</option>
    <option value="5">5×5</option>
    <option value="7">7×7</option>
  </select>

  <h3>🚪 Door Settings</h3>
  <label>Target Scene:</label>
  <input id="doorTarget" value="World2_Freiburg" style="width:100%;padding:4px;font-family:monospace;background:#0f3460;color:#eee;border:1px solid #444;">
  <label>Label:</label>
  <input id="doorLabel" value="Exit →" style="width:100%;padding:4px;font-family:monospace;background:#0f3460;color:#eee;border:1px solid #444;">

  <h3>🐛 Enemy to Place</h3>
  <select id="enemySelect">
    <option value="bug">bug</option>
  </select>

  <h3>⭐ Item to Place</h3>
  <select id="itemSelect">
    <option value="diploma">diploma</option>
    <option value="accepted_paper">accepted_paper</option>
    <option value="laptop">laptop</option>
    <option value="journal">journal</option>
    <option value="passport">passport</option>
    <option value="hat">hat</option>
  </select>

  <h3>👤 NPC to Place</h3>
  <select id="npcSelect">
    <option value="mom">mom</option>
    <option value="dad">dad</option>
    <option value="wolfgang">wolfgang</option>
    <option value="monika">monika</option>
    <option value="christine">christine</option>
    <option value="valentin">valentin</option>
    <option value="tobert">tobert</option>
    <option value="ben">ben</option>
    <option value="podelski">podelski</option>
    <option value="podelski_dog">podelski_dog</option>
    <option value="byron">byron</option>
    <option value="byron2">byron2</option>
    <option value="dejan">dejan</option>
    <option value="evren">evren</option>
    <option value="john">john</option>
    <option value="stephan">stephan</option>
    <option value="zhiming">zhiming</option>
    <option value="lauren">lauren</option>
    <option value="willem">willem</option>
  </select>
  <label>Custom ID:</label>
  <input id="customNpc" placeholder="e.g. professor" style="width:100%;padding:4px;font-family:monospace;background:#0f3460;color:#eee;border:1px solid #444;">

  <h3>📍 Placed Characters</h3>
  <div id="charList" class="char-list"></div>
</div>

<div id="main"><canvas id="c"></canvas></div>
<div id="status">Ready</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let mapName = 'world1', img, colData;
let gridW, gridH, blockSize;
let zoom = 1;
let manualBlocked = new Set();
let waterSet = new Set();
let tool = 'block';
let playerSpawn = null;  // {x, y} in map pixels
let npcs = [];           // [{id, x, y}]
let doors = [];          // [{x, y, target, label}]
let enemies = [];        // [{type, x, y}]
let items = [];          // [{id, x, y}]

const NPC_COLORS = {
  mom:'#4488ff', dad:'#44aa44', wolfgang:'#ff8844',
  monika:'#ff4488', christine:'#aa44ff', valentin:'#44ffcc',
  tobert:'#ff6644', ben:'#88aaff', podelski:'#ffcc44'
};
function npcColor(id) { return NPC_COLORS[id] || '#ffff00'; }

// Tool selection
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
  };
});

// Map loading
document.getElementById('mapSelect').onchange = function() { mapName = this.value; loadMap(); };

function loadMap() {
  img = new Image();
  img.src = '../assets/tilemaps/' + mapName + '_bg.png';
  img.onload = () => {
    fetch('../assets/tilemaps/' + mapName + '_collision.json')
      .then(r => r.ok ? r.json() : null).then(data => {
        colData = data || { world_width: img.naturalWidth, world_height: img.naturalHeight, block_size: 16, water_rects: [], blocked_tiles: [] };
        init();
      });
  };
}

function init() {
  blockSize = colData.block_size;
  gridW = Math.ceil(colData.world_width / blockSize);
  gridH = Math.ceil(colData.world_height / blockSize);
  canvas.width = colData.world_width;
  canvas.height = colData.world_height;

  waterSet.clear();
  colData.water_rects.forEach(r => {
    waterSet.add(Math.floor(r.x/blockSize) + ',' + Math.floor(r.y/blockSize));
  });

  manualBlocked.clear();
  if (colData.blocked_tiles) colData.blocked_tiles.forEach(([tx,ty]) => manualBlocked.add(tx+','+ty));

  playerSpawn = colData.player_spawn || null;
  npcs = colData.npcs || [];
  doors = colData.doors || [];
  enemies = colData.enemies || [];
  items = colData.items || [];

  updateCharList();
  fitZoom();
  draw();
  status.textContent = `Loaded ${mapName}: ${gridW}×${gridH} grid, block=${blockSize}px`;
}

function fitZoom() {
  const main = document.getElementById('main');
  zoom = Math.min(main.clientWidth / canvas.width, main.clientHeight / canvas.height, 1);
  applyZoom();
}

function applyZoom() {
  canvas.style.transform = `scale(${zoom})`;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  const wrapper = document.getElementById('main');
  wrapper.style.minWidth = (canvas.width * zoom) + 'px';
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  // Tile overlays
  for (let ty = 0; ty < gridH; ty++) {
    for (let tx = 0; tx < gridW; tx++) {
      const key = tx+','+ty, x = tx*blockSize, y = ty*blockSize;
      if (waterSet.has(key)) { ctx.fillStyle='rgba(255,0,0,0.2)'; ctx.fillRect(x,y,blockSize,blockSize); }
      if (manualBlocked.has(key)) { ctx.fillStyle='rgba(255,160,0,0.4)'; ctx.fillRect(x,y,blockSize,blockSize); }
    }
  }

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=0.5;
  for (let x=0;x<=canvas.width;x+=blockSize) { ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke(); }
  for (let y=0;y<=canvas.height;y+=blockSize) { ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke(); }

  // Player spawn
  if (playerSpawn) {
    ctx.fillStyle='#00ff88'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(playerSpawn.x, playerSpawn.y, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText('P', playerSpawn.x, playerSpawn.y+3);
  }

  // NPCs
  npcs.forEach(npc => {
    ctx.fillStyle = npcColor(npc.id); ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.fillRect(npc.x-10, npc.y-10, 20, 20); ctx.strokeRect(npc.x-10, npc.y-10, 20, 20);
    ctx.fillStyle='#fff'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText(npc.id, npc.x, npc.y-14);
  });

  // Doors
  doors.forEach(d => {
    ctx.fillStyle='rgba(244,232,66,0.3)'; ctx.strokeStyle='#f4e842'; ctx.lineWidth=2;
    ctx.fillRect(d.x-20, d.y-20, 40, 40); ctx.strokeRect(d.x-20, d.y-20, 40, 40);
    ctx.fillStyle='#f4e842'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('🚪 ' + (d.label||'Exit'), d.x, d.y-24);
    ctx.fillStyle='#aaa'; ctx.font='7px monospace';
    ctx.fillText(d.target||'', d.x, d.y+4);
  });

  // Enemies
  enemies.forEach(e => {
    ctx.fillStyle='rgba(255,50,50,0.4)'; ctx.strokeStyle='#ff3232'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(e.x, e.y, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#ff6666'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('🐛 ' + e.type, e.x, e.y-14);
  });

  // Items
  items.forEach(it => {
    ctx.fillStyle='rgba(66,244,166,0.4)'; ctx.strokeStyle='#42f4a6'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(it.x, it.y-12); ctx.lineTo(it.x+10, it.y+6); ctx.lineTo(it.x-10, it.y+6); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#42f4a6'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('⭐ ' + it.id, it.x, it.y-16);
  });

  ctx.textAlign='start';
}

function updateCharList() {
  const el = document.getElementById('charList');
  let html = '';
  if (playerSpawn) html += `<div>🧑 Player (${playerSpawn.x},${playerSpawn.y}) <span class="del" onclick="removePlayer()">✕</span></div>`;
  npcs.forEach((n,i) => {
    html += `<div>👤 ${n.id} (${n.x},${n.y}) <span class="del" onclick="removeNpc(${i})">✕</span></div>`;
  });
  doors.forEach((d,i) => {
    html += `<div>🚪 ${d.label||'Exit'} (${d.x},${d.y}) <span class="del" onclick="removeDoor(${i})">✕</span></div>`;
  });
  enemies.forEach((e,i) => {
    html += `<div>🐛 ${e.type} (${e.x},${e.y}) <span class="del" onclick="removeEnemy(${i})">✕</span></div>`;
  });
  items.forEach((it,i) => {
    html += `<div>⭐ ${it.id} (${it.x},${it.y}) <span class="del" onclick="removeItem(${i})">✕</span></div>`;
  });
  el.innerHTML = html || '<div style="color:#666">None placed</div>';
}

window.removePlayer = () => { playerSpawn = null; updateCharList(); draw(); };
window.removeNpc = (i) => { npcs.splice(i,1); updateCharList(); draw(); };
window.removeDoor = (i) => { doors.splice(i,1); updateCharList(); draw(); };
window.removeEnemy = (i) => { enemies.splice(i,1); updateCharList(); draw(); };
window.removeItem = (i) => { items.splice(i,1); updateCharList(); draw(); };

// Mouse interaction
let painting = false;
let rectStart = null; // for rect fill tool
function getMapPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.width / rect.width;
  return { x: Math.round((e.clientX-rect.left)*scale), y: Math.round((e.clientY-rect.top)*scale) };
}
function getTile(e) {
  const p = getMapPos(e);
  return { tx: Math.floor(p.x/blockSize), ty: Math.floor(p.y/blockSize) };
}

canvas.onmousedown = (e) => {
  if (tool === 'block' || tool === 'erase') { painting = true; paintTile(e); }
  else if (tool === 'rectfill' || tool === 'recterase') { rectStart = getTile(e); }
  else if (tool === 'player') { playerSpawn = getMapPos(e); updateCharList(); draw(); }
  else if (tool === 'npc') {
    const id = document.getElementById('customNpc').value.trim() || document.getElementById('npcSelect').value;
    const pos = getMapPos(e);
    npcs = npcs.filter(n => n.id !== id);
    npcs.push({ id, x: pos.x, y: pos.y });
    updateCharList(); draw();
  }
  else if (tool === 'door') {
    const pos = getMapPos(e);
    const target = document.getElementById('doorTarget').value.trim();
    const label = document.getElementById('doorLabel').value.trim();
    doors.push({ x: pos.x, y: pos.y, target, label });
    updateCharList(); draw();
  }
  else if (tool === 'enemy') {
    const pos = getMapPos(e);
    const type = document.getElementById('enemySelect').value;
    enemies.push({ type, x: pos.x, y: pos.y });
    updateCharList(); draw();
  }
  else if (tool === 'item') {
    const pos = getMapPos(e);
    const id = document.getElementById('itemSelect').value;
    items.push({ id, x: pos.x, y: pos.y });
    updateCharList(); draw();
  }
};
canvas.onmousemove = (e) => {
  if (painting) paintTile(e);
  // Rect preview
  if (rectStart && (tool === 'rectfill' || tool === 'recterase')) {
    draw();
    const cur = getTile(e);
    const x0 = Math.min(rectStart.tx, cur.tx), y0 = Math.min(rectStart.ty, cur.ty);
    const x1 = Math.max(rectStart.tx, cur.tx), y1 = Math.max(rectStart.ty, cur.ty);
    ctx.fillStyle = tool === 'rectfill' ? 'rgba(255,160,0,0.3)' : 'rgba(100,200,255,0.3)';
    ctx.strokeStyle = tool === 'rectfill' ? '#ffa000' : '#66ccff';
    ctx.lineWidth = 2;
    const rx = x0*blockSize, ry = y0*blockSize, rw = (x1-x0+1)*blockSize, rh = (y1-y0+1)*blockSize;
    ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeRect(rx, ry, rw, rh);
    status.textContent = `Rect: ${x1-x0+1}×${y1-y0+1} tiles | Tile: ${cur.tx},${cur.ty}`;
    return;
  }
  const p = getMapPos(e);
  const t = getTile(e);
  status.textContent = `Tile: ${t.tx},${t.ty} | Pixel: ${p.x},${p.y} | Tool: ${tool}`;
};
canvas.onmouseup = (e) => {
  painting = false;
  if (rectStart && (tool === 'rectfill' || tool === 'recterase')) {
    const cur = getTile(e);
    const x0 = Math.min(rectStart.tx, cur.tx), y0 = Math.min(rectStart.ty, cur.ty);
    const x1 = Math.max(rectStart.tx, cur.tx), y1 = Math.max(rectStart.ty, cur.ty);
    for (let ty = y0; ty <= y1; ty++) for (let tx = x0; tx <= x1; tx++) {
      if (tx>=0 && ty>=0 && tx<gridW && ty<gridH) {
        const key = tx+','+ty;
        if (tool === 'rectfill') manualBlocked.add(key); else manualBlocked.delete(key);
      }
    }
    rectStart = null;
    draw();
  }
};
canvas.onmouseleave = () => { painting = false; rectStart = null; };

function paintTile(e) {
  const {tx,ty} = getTile(e);
  const r = Math.floor((parseInt(document.getElementById('brushSize').value) || 1) / 2);
  for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
    const bx = tx+dx, by = ty+dy;
    if (bx<0||by<0||bx>=gridW||by>=gridH) continue;
    const key = bx+','+by;
    if (tool==='block') manualBlocked.add(key); else manualBlocked.delete(key);
  }
  draw();
}

// Save
document.getElementById('btnSave').onclick = () => {
  colData.blocked_tiles = [...manualBlocked].map(s => s.split(',').map(Number));
  colData.player_spawn = playerSpawn;
  colData.npcs = npcs;
  colData.doors = doors;
  colData.enemies = enemies;
  colData.items = items;
  const blob = new Blob([JSON.stringify(colData, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = mapName + '_collision.json'; a.click();
  status.textContent = 'Saved! Move file to assets/tilemaps/' + mapName + '_collision.json';
};

// Load external JSON
document.getElementById('btnLoad').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { colData = JSON.parse(ev.target.result); init(); };
  reader.readAsText(file);
};

// Zoom with scroll wheel
document.getElementById('main').addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom = Math.min(3, Math.max(0.1, zoom * (e.deltaY < 0 ? 1.15 : 0.87)));
  applyZoom();
  status.textContent = `Zoom: ${Math.round(zoom*100)}%`;
}, { passive: false });

loadMap();
</script>
</body></html>
